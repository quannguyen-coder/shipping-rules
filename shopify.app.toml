# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "0810683969c73d17b6d024ca3a99572a"
name = "Shipping Rules"
application_url = "https://shipping-rules-zkr6.onrender.com"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-04"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

# Proxy target must be the same public base URL as your running app (tunnel in dev).
# If this does not match application_url, /apps/shipping-rules/* on the storefront often returns 500.
[app_proxy]
url = "https://shipping-rules-zkr6.onrender.com"
prefix = "apps"
subpath = "shipping-rules"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_cart_transforms,write_cart_transforms,read_all_cart_transforms,read_price_rules,write_price_rules,read_discounts,write_discounts,read_metaobjects,write_metaobjects,read_products,write_products,read_publications,write_publications"
optional_scopes = [ ]
use_legacy_install_flow = false

[auth]
redirect_urls = [ ]

[product.metafields.app.demo_info]
type = "single_line_text_field"
name = "Demo Source Info"
description = "Tracks products created by the Shopify app template for development"

  [product.metafields.app.demo_info.access]
  admin = "merchant_read_write"

[shop.metafields.app.shipping_rules_config]
type = "json"
name = "Shipping Rules Config"
description = "Published shipping surcharge rules and cart transform settings"

  [shop.metafields.app.shipping_rules_config.access]
  admin = "merchant_read_write"

[metaobjects.app.example]
name = "Example"
description = "An example metaobject definition created by this template"

  [metaobjects.app.example.access]
  admin = "merchant_read_write"

[metaobjects.app.example.fields.title]
name = "Title"
type = "single_line_text_field"
required = true

[metaobjects.app.example.fields.description]
name = "Description"
type = "multi_line_text_field"
