query CartTransformRunInput {
  shop {
    metafield(namespace: "$app", key: "shipping_rules_config") {
      jsonValue
    }
  }
  cart {
    lines {
      id
      quantity
      cost {
        amountPerQuantity {
          amount
        }
      }
      merchandise {
        __typename
        ... on ProductVariant {
          id
          weight
          weightUnit
        }
      }
    }
  }
}
